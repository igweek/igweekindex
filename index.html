<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gweek 的个人主页与社交链接。">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="color-scheme" content="light dark">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Gweek — Personal Homepage">
  <meta property="og:description" content="Gweek 的个人主页与社交链接。">
  <title>Gweek — Personal Homepage</title>

  <link rel="icon" href="assets/images/favicon.webp" type="image/webp">

  <script>
    (() => {
      const hour = new Date().getHours();
      const isDaytime = hour >= 7 && hour < 19;
      let savedTheme = null;

      try {
        savedTheme = localStorage.getItem("gweek-theme");
      } catch {
        // 隐私模式或受限环境下继续使用时间主题。
      }

      const theme = savedTheme === "light" || savedTheme === "dark"
        ? savedTheme
        : isDaytime ? "light" : "dark";

      document.documentElement.dataset.theme = theme;
      document.querySelector('meta[name="theme-color"]').content = theme === "light" ? "#f0f0f0" : "#0d0d0d";
    })();
  </script>

  <style>
    @font-face {
      font-family: "Dancing Script";
      src: url("assets/fonts/DancingScript-VariableFont_wght.ttf") format("truetype");
      font-weight: 400 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light dark;
      --foreground: #fff;
      --background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 60%, #000 100%);
      --grid-color: rgba(80, 80, 80, 0.25);
      --toggle-background: rgba(255, 255, 255, 0.07);
      --toggle-hover: rgba(255, 255, 255, 0.14);
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --foreground: #111;
      --background: radial-gradient(circle at center, #fff 0%, #f0f0f0 60%, #e0e0e0 100%);
      --grid-color: rgba(150, 150, 150, 0.25);
      --toggle-background: rgba(0, 0, 0, 0.05);
      --toggle-hover: rgba(0, 0, 0, 0.1);
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      padding: 32px 0;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--foreground);
      background: var(--background);
      font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      transition: background 0.5s, color 0.5s;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.6) 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.6) 40%, transparent 100%);
      pointer-events: none;
    }

    .theme-toggle {
      position: fixed;
      z-index: 2;
      top: max(18px, env(safe-area-inset-top));
      right: max(18px, env(safe-area-inset-right));
      width: 44px;
      height: 44px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid color-mix(in srgb, currentColor 28%, transparent);
      border-radius: 50%;
      color: inherit;
      background: var(--toggle-background);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: background-color 0.2s, border-color 0.2s, transform 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .theme-toggle:hover {
      background: var(--toggle-hover);
      transform: translateY(-2px);
    }

    .theme-toggle:active {
      transform: translateY(0) scale(0.95);
    }

    .theme-toggle:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 3px;
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .theme-toggle .icon-moon,
    :root[data-theme="light"] .theme-toggle .icon-sun {
      display: none;
    }

    :root[data-theme="light"] .theme-toggle .icon-moon {
      display: block;
    }

    .profile {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      padding: 0 20px;
      text-align: center;
    }

    .avatar {
      width: clamp(80px, 15vw, 120px);
      height: clamp(80px, 15vw, 120px);
      margin-bottom: 15px;
      border: 3px solid currentColor;
      border-radius: 50%;
      object-fit: cover;
      transform: scale(0.95);
      -webkit-user-drag: none;
    }

    .name {
      margin: 0 0 15px;
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 400;
      letter-spacing: 1px;
    }

    .subtitle {
      margin: 0;
      color: inherit;
      font-family: "Dancing Script", cursive;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 400;
      opacity: 0.8;
    }

    .nav {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(10px, 3vw, 28px);
    }

    .nav a {
      min-width: 64px;
      min-height: 52px;
      padding: 6px;
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
      color: inherit;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-align: center;
      text-decoration: none;
      transition: transform 0.2s, opacity 0.3s, background-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav a:hover {
      opacity: 0.72;
      transform: translateY(-3px);
    }

    .nav a:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 3px;
      background: color-mix(in srgb, currentColor 10%, transparent);
    }

    .nav svg {
      width: 21px;
      height: 21px;
      margin-bottom: 8px;
      display: block;
      fill: currentColor;
    }

    @media (max-width: 420px) {
      body {
        padding: 24px 0;
      }

      .nav {
        gap: 8px;
      }

      .nav a {
        min-width: 56px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

  <script>
    (() => {
      const toggle = document.querySelector(".theme-toggle");
      const themeColor = document.querySelector('meta[name="theme-color"]');

      const updateToggle = () => {
        const isLight = document.documentElement.dataset.theme === "light";
        const label = isLight ? "切换到暗色模式" : "切换到亮色模式";
        toggle.setAttribute("aria-label", label);
        toggle.setAttribute("title", label);
        toggle.setAttribute("aria-pressed", String(isLight));
        themeColor.content = isLight ? "#f0f0f0" : "#0d0d0d";
      };

      toggle.addEventListener("click", () => {
        const nextTheme = document.documentElement.dataset.theme === "light" ? "dark" : "light";
        document.documentElement.dataset.theme = nextTheme;

        try {
          localStorage.setItem("gweek-theme", nextTheme);
        } catch {
          // 主题切换仍然生效，只是不保存。
        }

        updateToggle();
      });

      updateToggle();
    })();
  </script>
